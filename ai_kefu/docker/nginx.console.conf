server {
    listen 80;
    server_name _;

    # ── 知识库管理 UI (/ui/knowledge) ──────────────────────────
    location /ui/knowledge/ {
        alias /usr/share/nginx/html/knowledge/;
        index index.html;
        # Vue Router history 模式 SPA fallback
        try_files $uri $uri/ /ui/knowledge/index.html;
    }

    # ── 对话管理 UI (/ui/conversations) ────────────────────────
    location /ui/conversations/ {
        alias /usr/share/nginx/html/conversations/;
        index index.html;
        # Vue Router history 模式 SPA fallback
        try_files $uri $uri/ /ui/conversations/index.html;
    }

    # ── 根路径重定向到知识库 UI ─────────────────────────────────
    location = / {
        return 302 /ui/knowledge/;
    }

    # ── 反向代理到 API 后台 ─────────────────────────────────────
    location / {
        proxy_pass http://${API_HOST:-api}:${API_PORT:-8000};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── 静态资源缓存 ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 健康检查端点 ─────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
