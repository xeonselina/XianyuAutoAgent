server {
    listen 80;
    server_name _;

    # 禁止 nginx 把 302 Location 拼成绝对 URL（会丢掉宿主机端口，如 8080→80 导致 404）
    # 关掉后 return 302 /path/ 只发相对路径，浏览器保持当前端口
    absolute_redirect off;

    # ── 知识库管理 UI (/ui/knowledge) ──────────────────────────
    # ^~ 使前缀匹配优先于正则，防止 JS/CSS 被下方静态资源缓存规则截走
    location ^~ /ui/knowledge/ {
        alias /usr/share/nginx/html/knowledge/;
        index index.html;
        # Vue Router history 模式 SPA fallback
        try_files $uri $uri/ /ui/knowledge/index.html;
    }

    # ── 对话管理 UI (/ui/conversations) ────────────────────────
    location ^~ /ui/conversations/ {
        alias /usr/share/nginx/html/conversations/;
        index index.html;
        # Vue Router history 模式 SPA fallback
        try_files $uri $uri/ /ui/conversations/index.html;
    }

    # ── 根路径重定向到知识库 UI ─────────────────────────────────
    location = / {
        return 302 /ui/knowledge/;
    }

    # ── 反向代理到 API 后台 ─────────────────────────────────────
    location / {
        # 修复：将 upstream 地址存入 nginx 变量，使 DNS 解析推迟到请求时而非
        # nginx 启动时。原因：proxy_pass 直接写 http://hostname:port 时，nginx
        # 在 worker 初始化阶段就解析该主机名；若此时 hostname 无法解析（如
        # 默认 bridge 网络上不存在名为 "api" 的容器），nginx 直接拒绝启动。
        # 使用变量后，nginx 每次代理请求时才调用 resolver 解析，启动时不检测。
        # 注意：${API_HOST} / ${API_PORT} 由 envsubst 替换为环境变量值；
        #       $upstream_api / $host 等是 nginx 内部变量，envsubst 不会动它们。
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream_api http://${API_HOST}:${API_PORT};
        proxy_pass $upstream_api;
        # 传 $http_host（含端口，如 192.168.50.132:8080）而非 $host（不含端口）
        # 否则 FastAPI 生成 307 trailing-slash 跳转时会丢掉端口，变成 :80
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 兜底：将 API 返回的 Location 里的裸 host 换回带端口的 http_host
        proxy_redirect http://$host/ http://$http_host/;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── 静态资源缓存 ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 健康检查端点 ─────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
